name: CI Windows

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test (windows-latest)
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on:
      labels: omne42-local
    concurrency:
      group: persistent-worktree-${{ github.repository }}
      cancel-in-progress: false
    timeout-minutes: 45
    env:
      CARGO_HOME: C:\actions-cache\cargo
      RUSTUP_HOME: C:\actions-cache\rustup
      CARGO_TARGET_DIR: C:\actions-cache\omne-runtime\target
      OMNE_RUNTIME_REPO_DIR: C:\actions-cache\repos\omne42\omne-runtime
      OMNE_RUNTIME_MIRROR_DIR: C:\actions-cache\mirrors\omne42\omne-runtime.git
      OMNE_FOUNDATION_REPO_DIR: C:\actions-cache\repos\omne42\omne_foundation
      OMNE_FOUNDATION_MIRROR_DIR: C:\actions-cache\mirrors\omne42\omne_foundation.git

    steps:
      - name: Sync persistent workspace
        id: sync
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $true

          function Invoke-WithRetry {
            param(
              [string]$Description,
              [scriptblock]$Script,
              [int]$MaxAttempts = 4,
              [int]$DelaySeconds = 5
            )

            for ($attempt = 1; $attempt -le $MaxAttempts; $attempt++) {
              try {
                & $Script
                return
              } catch {
                if ($attempt -eq $MaxAttempts) {
                  throw
                }
                Write-Warning ("{0} failed on attempt {1}/{2}: {3}" -f $Description, $attempt, $MaxAttempts, $_.Exception.Message)
                Start-Sleep -Seconds $DelaySeconds
              }
            }
          }

          function Sync-Repo {
            param(
              [string]$RepoUrl,
              [string]$RepoDir,
              [string]$MirrorDir,
              [string]$Ref,
              [string]$FetchRefspec
            )

            $repoExists = Test-Path (Join-Path $RepoDir ".git")
            $mirrorExists = Test-Path $MirrorDir

            New-Item -ItemType Directory -Force -Path (Split-Path $RepoDir -Parent) | Out-Null
            New-Item -ItemType Directory -Force -Path (Split-Path $MirrorDir -Parent) | Out-Null

            if (-not $mirrorExists) {
              Invoke-WithRetry -Description "git clone --mirror $RepoUrl" -Script {
                git -c http.version=HTTP/1.1 clone --mirror $RepoUrl $MirrorDir
              }
            }

            if (-not $repoExists) {
              git -c safe.directory=$MirrorDir clone $MirrorDir $RepoDir
            }

            git -c safe.directory=$RepoDir -C $RepoDir remote set-url origin $RepoUrl
            Invoke-WithRetry -Description "git fetch worktree $RepoUrl" -Script {
              git -c http.version=HTTP/1.1 -c safe.directory=$RepoDir -C $RepoDir fetch --prune origin $FetchRefspec
            }
            git -c safe.directory=$RepoDir -C $RepoDir reset --hard $Ref
            git -c safe.directory=$RepoDir -C $RepoDir clean -ffdx

            return [ordered]@{
              mirror_exists = $mirrorExists
              repo_exists = $repoExists
              head = (git -c safe.directory=$RepoDir -C $RepoDir rev-parse HEAD)
            }
          }

          function To-BashPath([string]$Path) {
            $drive = $Path.Substring(0, 1).ToLowerInvariant()
            $rest = $Path.Substring(2).Replace('\', '/')
            return "/$drive$rest"
          }

          $before = [ordered]@{
            cargo_registry_exists = Test-Path (Join-Path $env:CARGO_HOME "registry")
            target_exists = Test-Path $env:CARGO_TARGET_DIR
            target_entries = if (Test-Path $env:CARGO_TARGET_DIR) { (Get-ChildItem $env:CARGO_TARGET_DIR -Force -ErrorAction SilentlyContinue | Measure-Object).Count } else { 0 }
          }

          New-Item -ItemType Directory -Force -Path $env:CARGO_HOME | Out-Null
          New-Item -ItemType Directory -Force -Path $env:RUSTUP_HOME | Out-Null
          New-Item -ItemType Directory -Force -Path $env:CARGO_TARGET_DIR | Out-Null

          $runtime = Sync-Repo "https://github.com/${{ github.repository }}.git" $env:OMNE_RUNTIME_REPO_DIR $env:OMNE_RUNTIME_MIRROR_DIR $env:GITHUB_SHA "+${{ github.ref }}:refs/remotes/origin/__sync_target"
          $foundation = Sync-Repo "https://github.com/omne42/omne_foundation.git" $env:OMNE_FOUNDATION_REPO_DIR $env:OMNE_FOUNDATION_MIRROR_DIR "origin/main" "+refs/heads/main:refs/remotes/origin/main"

          $runtimeRepoDirBash = To-BashPath $env:OMNE_RUNTIME_REPO_DIR

          $report = [ordered]@{
            repository = $env:GITHUB_REPOSITORY
            sha = $env:GITHUB_SHA
            before = $before
            runtime = [ordered]@{
              repo_dir = $env:OMNE_RUNTIME_REPO_DIR
              repo_dir_bash = $runtimeRepoDirBash
              mirror_existed_before = $runtime.mirror_exists
              repo_existed_before = $runtime.repo_exists
              head = $runtime.head
            }
            foundation = [ordered]@{
              repo_dir = $env:OMNE_FOUNDATION_REPO_DIR
              mirror_existed_before = $foundation.mirror_exists
              repo_existed_before = $foundation.repo_exists
              head = $foundation.head
            }
          }

          $reportPath = Join-Path $env:RUNNER_TEMP "persistent-cache-report.json"
          $report | ConvertTo-Json -Depth 6 | Out-File -FilePath $reportPath -Encoding utf8

          Write-Host "persistent-cache: runtime_mirror_exists_before=$($runtime.mirror_exists)"
          Write-Host "persistent-cache: runtime_worktree_exists_before=$($runtime.repo_exists)"
          Write-Host "persistent-cache: foundation_mirror_exists_before=$($foundation.mirror_exists)"
          Write-Host "persistent-cache: foundation_worktree_exists_before=$($foundation.repo_exists)"
          Write-Host "persistent-cache: cargo_registry_exists_before=$($before.cargo_registry_exists)"
          Write-Host "persistent-cache: target_exists_before=$($before.target_exists)"
          Write-Host "persistent-cache: runtime_repo_dir=$($env:OMNE_RUNTIME_REPO_DIR)"
          Write-Host "persistent-cache: foundation_repo_dir=$($env:OMNE_FOUNDATION_REPO_DIR)"
          Write-Host "persistent-cache: synced_runtime_sha=$($runtime.head)"
          Write-Host "persistent-cache: synced_foundation_sha=$($foundation.head)"

          "repo_dir_bash=$runtimeRepoDirBash" >> $env:GITHUB_OUTPUT
          "report_path=$reportPath" >> $env:GITHUB_OUTPUT

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: rustfmt,clippy

      - name: Record persistent target state before build
        id: target_before
        shell: pwsh
        run: |
          $count = if (Test-Path $env:CARGO_TARGET_DIR) { (Get-ChildItem $env:CARGO_TARGET_DIR -Recurse -Force -ErrorAction SilentlyContinue | Measure-Object).Count } else { 0 }
          Write-Host "persistent-cache: target_entries_before_build=$count"
          "entry_count=$count" >> $env:GITHUB_OUTPUT

      - name: Gates
        shell: bash
        env:
          OMNE_RUNTIME_REPO_DIR_BASH: ${{ steps.sync.outputs.repo_dir_bash }}
          SAFE_FS_TOOLS_ALLOW_SYMLINK_SKIP: "1"
        run: |
          cd "$OMNE_RUNTIME_REPO_DIR_BASH"
          ./crates/omne-fs/scripts/gate.sh

      - name: Summarize persistent cache state
        if: always() && steps.sync.outputs.report_path != ''
        shell: pwsh
        run: |
          $report = Get-Content "${{ steps.sync.outputs.report_path }}" | ConvertFrom-Json
          $afterCount = if (Test-Path $env:CARGO_TARGET_DIR) { (Get-ChildItem $env:CARGO_TARGET_DIR -Recurse -Force -ErrorAction SilentlyContinue | Measure-Object).Count } else { 0 }
          $warmTarget = [int]${{ steps.target_before.outputs.entry_count }} -gt 0
          $warmCargoRegistry = [bool]$report.before.cargo_registry_exists

          $lines = @(
            "### Windows persistent workspace cache"
            "- runtime repo dir: $($report.runtime.repo_dir)"
            "- foundation repo dir: $($report.foundation.repo_dir)"
            "- synced runtime sha: $($report.runtime.head)"
            "- synced foundation sha: $($report.foundation.head)"
            "- runtime mirror existed before run: $($report.runtime.mirror_existed_before)"
            "- runtime worktree existed before run: $($report.runtime.repo_existed_before)"
            "- foundation mirror existed before run: $($report.foundation.mirror_existed_before)"
            "- foundation worktree existed before run: $($report.foundation.repo_existed_before)"
            "- cargo registry existed before run: $warmCargoRegistry"
            "- target existed before run: $($report.before.target_exists)"
            "- target entries before build: ${{ steps.target_before.outputs.entry_count }}"
            "- target entries after build: $afterCount"
            "- warm cache hit: $([bool]($warmTarget -or $warmCargoRegistry))"
          )

          $lines | ForEach-Object { Write-Host $_ }
          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ($lines -join "`n")
