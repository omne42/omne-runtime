name: Docs Pages

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/omne-systems-fs/**"
      - "crates/omne-systems-fs-primitives/**"
      - "crates/omne-systems-exec-gateway/**"
      - ".github/workflows/docs-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Rust cache
        uses: Swatinem/rust-cache@401aff9a7a08acb9d27b64936a90db81024cff97 # v2.8.2

      - name: Setup Python
        uses: actions/setup-python@42375524f8ff6da1a8ebd5e3f7c6f6d88d548ec2 # v5.4.0
        with:
          python-version: "3.12"

      - name: Install docs tooling
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs==1.6.1 mkdocs-material==9.7.3 mike==2.1.3 pymdown-extensions==10.21

      - name: Build fs rustdoc
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --locked -p omne-systems-fs --no-deps --all-features

      - name: Add fs rustdoc landing page
        shell: bash
        run: |
          set -euo pipefail
          cat > target/doc/index.html <<'EOF'
          <!doctype html>
          <meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=omne_systems_fs/">
          <link rel="canonical" href="omne_systems_fs/">
          <title>omne-systems-fs docs</title>
          <p>Redirecting to <a href="omne_systems_fs/">omne-systems-fs</a>.</p>
          EOF

      - name: Build exec gateway docs
        working-directory: crates/omne-systems-exec-gateway
        run: mkdocs build -d ../../target/pages/exec-gateway

      - name: Assemble combined Pages site
        shell: bash
        run: |
          set -euo pipefail
          site_root="target/pages"
          mkdir -p "$site_root/fs-rustdoc"
          cp -R target/doc/. "$site_root/fs-rustdoc/"
          cat > "$site_root/index.html" <<'EOF'
          <!doctype html>
          <meta charset="utf-8">
          <title>omne-systems-runtime docs</title>
          <h1>omne-systems-runtime docs</h1>
          <ul>
            <li><a href="fs-rustdoc/">Filesystem rustdoc</a></li>
            <li><a href="exec-gateway/">Execution gateway guides</a></li>
          </ul>
          EOF
          touch "$site_root/.nojekyll"

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0
        with:
          enablement: true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3.0.1
        with:
          path: target/pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
