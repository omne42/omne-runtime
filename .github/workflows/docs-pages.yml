name: Docs Pages

on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - "Cargo.lock"
      - "crates/omne-fs/**"
      - "crates/omne-fs-primitives/**"
      - "crates/omne-execution-gateway/**"
      - ".github/workflows/docs-pages.yml"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-pages-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout runtime
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          path: omne-runtime

      - name: Checkout foundation
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: omne42/omne_foundation
          path: omne_foundation

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable

      - name: Rust cache
        uses: Swatinem/rust-cache@401aff9a7a08acb9d27b64936a90db81024cff97 # v2.8.2
        with:
          workspaces: |
            omne-runtime -> target

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install docs tooling
        run: |
          python -m pip install --upgrade pip
          pip install mkdocs==1.6.1 mkdocs-material==9.7.3 mike==2.1.3 pymdown-extensions==10.21

      - name: Build fs rustdoc
        working-directory: omne-runtime
        env:
          RUSTDOCFLAGS: "-D warnings"
        run: cargo doc --locked -p omne-fs --no-deps --all-features

      - name: Add fs rustdoc landing page
        shell: bash
        working-directory: omne-runtime
        run: |
          set -euo pipefail
          cat > target/doc/index.html <<'EOF'
          <!doctype html>
          <meta charset="utf-8">
          <meta http-equiv="refresh" content="0; url=omne_fs/">
          <link rel="canonical" href="omne_fs/">
          <title>omne-fs docs</title>
          <p>Redirecting to <a href="omne_fs/">omne-fs</a>.</p>
          EOF

      - name: Build exec gateway docs
        working-directory: omne-runtime/crates/omne-execution-gateway
        run: mkdocs build -d ../../target/pages/exec-gateway

      - name: Assemble combined Pages site
        shell: bash
        working-directory: omne-runtime
        run: |
          set -euo pipefail
          site_root="target/pages"
          mkdir -p "$site_root/fs-rustdoc"
          cp -R target/doc/. "$site_root/fs-rustdoc/"
          cat > "$site_root/index.html" <<'EOF'
          <!doctype html>
          <meta charset="utf-8">
          <title>omne-runtime docs</title>
          <h1>omne-runtime docs</h1>
          <ul>
            <li><a href="fs-rustdoc/">Filesystem rustdoc</a></li>
            <li><a href="exec-gateway/">Execution gateway guides</a></li>
          </ul>
          EOF
          touch "$site_root/.nojekyll"

      - name: Upload docs artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: omne-runtime-docs-site
          path: omne-runtime/target/pages
