name: CI macOS

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (macos-latest)
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout runtime
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          path: omne-runtime

      - name: Checkout foundation
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          repository: omne42/omne_foundation
          path: omne_foundation

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          components: rustfmt,clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@401aff9a7a08acb9d27b64936a90db81024cff97 # v2.8.2
        with:
          workspaces: |
            omne-runtime -> target

      - name: Gates
        shell: bash
        working-directory: omne-runtime
        run: ./crates/omne-fs/scripts/gate.sh
